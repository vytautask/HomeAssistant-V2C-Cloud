name: Validate with hassfest
permissions:
  contents: read

on:
  push:
  pull_request:
  schedule:
  - cron:  '0 0 * * *'

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
    - uses: "actions/checkout@v4"
    - uses: "home-assistant/actions/hassfest@dce0e860c68256ef2902ece06afa5401eb4674e1"  # master
