name: Tag and Release on manifest.json version change

on:
  push:
    paths:
      - 'custom_components/v2c_cloud_4g_4g/manifest.json'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: SAST (bandit)
        run: |
          bandit -r custom_components/v2c_cloud_4g/ \
            --severity-level medium \
            --confidence-level medium

      - name: Dependency audit (pip-audit)
        run: |
          pip-audit -r requirements.txt --format=columns
          pip-audit -r requirements_test.txt --format=columns

  tag-and-release:
    runs-on: ubuntu-latest
    needs: [test, security]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/v2c_cloud_4g_4g/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag exists"
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "Tag does not exist"
            echo "EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Create tag and push
        if: env.EXISTS == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Prepare release notes from changelog
        if: env.EXISTS == 'false'
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["VERSION"]
          changelog_path = pathlib.Path("CHANGELOG.md")
          if not changelog_path.exists():
              sys.exit("CHANGELOG.md not found")

          text = changelog_path.read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, text, flags=re.MULTILINE | re.DOTALL)
          if not match:
              sys.exit(f"Release notes for version {version} not found in CHANGELOG.md")

          section = match.group(0).strip()
          pathlib.Path("release_body.md").write_text(section, encoding="utf-8")
          PY

      - name: Build release ZIP
        if: env.EXISTS == 'false'
        run: |
          cd "${{ github.workspace }}/custom_components/v2c_cloud_4g"
          zip v2c_cloud.zip -r ./

      - name: Create GitHub Release
        if: env.EXISTS == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_body.md
          files: ${{ github.workspace }}/custom_components/v2c_cloud_4g/v2c_cloud.zip
